<!DOCTYPE html>
<!-- ============================================================================
     VILLAIN ARC — offline portrait renderer (dev tool, not shipped to players)
     Loads one villain GLB, frames a 3/4 bust with a dramatic violet rim light on
     a transparent background, and exposes the canvas as a PNG data URL.
     Driven by tools/gen_portraits.js (puppeteer) → writes assets/portrait_*.png.
     Query params:  ?model=models/villains/villain_a.glb&idle=0
     ========================================================================== -->
<html><head><meta charset="utf-8" /><style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  #c{width:100vw;height:100vh;display:block}
</style></head>
<body>
<canvas id="c"></canvas>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
(async function () {
  const qs = new URLSearchParams(location.search);
  const model = qs.get("model") || "models/villains/villain_a.glb";
  const idleIndex = parseInt(qs.get("idle") || "0", 10);
  const TARGET_H = 4;

  const canvas = document.getElementById("c");
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, antialias: true });
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0, 0, 0, 0); // transparent

  // --- lighting: dim fill + strong violet rim from behind for a dramatic bust ---
  const fill = new BABYLON.HemisphericLight("fill", new BABYLON.Vector3(0.2, 1, 0.4), scene);
  fill.intensity = 0.55;
  fill.diffuse = new BABYLON.Color3(0.62, 0.55, 0.85);
  fill.groundColor = new BABYLON.Color3(0.10, 0.06, 0.18);

  const key = new BABYLON.DirectionalLight("key", new BABYLON.Vector3(-0.4, -0.7, 0.6), scene);
  key.position = new BABYLON.Vector3(5, 8, -6);
  key.intensity = 1.0;
  key.diffuse = new BABYLON.Color3(0.95, 0.9, 1.0);

  // violet rim lights flanking from behind
  const rimL = new BABYLON.PointLight("rimL", new BABYLON.Vector3(-3.2, 3.6, -3.5), scene);
  rimL.intensity = 2.6; rimL.diffuse = new BABYLON.Color3(0.74, 0.32, 1.0); rimL.range = 18;
  const rimR = new BABYLON.PointLight("rimR", new BABYLON.Vector3(3.2, 3.0, -3.0), scene);
  rimR.intensity = 2.0; rimR.diffuse = new BABYLON.Color3(0.55, 0.30, 1.0); rimR.range = 18;

  try { const gl = new BABYLON.GlowLayer("glow", scene); gl.intensity = 0.6; } catch (_e) {}

  // 3/4 view, framed on the upper body (head + shoulders + chest)
  const cam = new BABYLON.ArcRotateCamera("cam", -Math.PI / 2 + 0.42, Math.PI / 2.18, 4.7,
    new BABYLON.Vector3(0, TARGET_H * 0.80, 0), scene);
  cam.fov = 0.62;
  cam.minZ = 0.05; cam.maxZ = 100;

  function bboxExtents(meshes) {
    let minY = Infinity, maxY = -Infinity;
    meshes.forEach((m) => {
      if (!m.getBoundingInfo) return;
      try {
        m.computeWorldMatrix(true); m.refreshBoundingInfo();
        const bi = m.getBoundingInfo();
        if (bi.boundingBox.minimumWorld.y < minY) minY = bi.boundingBox.minimumWorld.y;
        if (bi.boundingBox.maximumWorld.y > maxY) maxY = bi.boundingBox.maximumWorld.y;
      } catch (_e) {}
    });
    if (!isFinite(minY) || !isFinite(maxY)) { minY = 0; maxY = 1; }
    return { minY, maxY };
  }

  try {
    const container = await BABYLON.SceneLoader.LoadAssetContainerAsync("", model, scene);
    container.addAllToScene();
    const ext = bboxExtents(container.meshes);
    const natH = ext.maxY - ext.minY;
    const scale = natH > 0.001 ? TARGET_H / natH : 1;
    const root = new BABYLON.TransformNode("root", scene);
    container.rootNodes.forEach((rn) => { rn.parent = root; });
    root.scaling.setAll(scale);
    root.position.y = -ext.minY * scale;
    root.rotation.y = 0;

    const groups = container.animationGroups || [];
    groups.forEach((g) => { try { g.stop(); } catch (_e) {} });
    const idle = groups[idleIndex] || groups[0];
    if (idle) { try { idle.start(true, 1, idle.from, idle.to, false); } catch (_e) {} }

    // let the idle pose settle, then signal ready
    let frames = 0;
    scene.onAfterRenderObservable.add(() => { frames++; if (frames === 40) window.PORTRAIT_READY = true; });
  } catch (e) {
    console.error("portrait load failed:", e && e.message);
    window.PORTRAIT_READY = "error";
  }

  engine.runRenderLoop(() => scene.render());
  window.getPortraitPNG = function () { return canvas.toDataURL("image/png"); };
})();
</script>
</body></html>
